<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선생님 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #F5F4F0;
    --surface:   #FFFFFF;
    --border:    #E2E0D8;
    --text:      #1A1A18;
    --muted:     #6B6A64;
    --hint:      #A8A79F;
    --blue:      #185FA5;
    --blue-bg:   #E6F1FB;
    --green:     #3B6D11;
    --green-bg:  #EAF3DE;
    --amber:     #854F0B;
    --amber-bg:  #FAEEDA;
    --purple:    #534AB7;
    --purple-bg: #EEEDFE;
    --red:       #A32D2D;
    --red-bg:    #FCEBEB;
    --radius:    10px;
    --radius-sm: 6px;
  }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; min-height:100vh; }

  /* 설정 배너 */
  #setup-banner { background:#FFF8E1; border-bottom:1px solid #FFD54F; padding:10px 24px; font-size:13px; color:#5D4037; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  #setup-banner span { white-space:nowrap; }
  #setup-banner input { flex:1; min-width:200px; font-size:13px; padding:6px 10px; border:1px solid #FFD54F; border-radius:6px; background:#fff; outline:none; font-family:inherit; }
  #setup-banner button { font-size:13px; padding:6px 14px; background:#185FA5; color:#fff; border:none; border-radius:6px; cursor:pointer; white-space:nowrap; font-family:inherit; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  header h1 { font-size:15px; font-weight:700; letter-spacing:-0.02em; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .header-date { font-size:12px; color:var(--muted); }
  .settings-btn { font-size:12px; padding:5px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:none; color:var(--muted); cursor:pointer; font-family:inherit; }
  .settings-btn:hover { border-color:var(--blue); color:var(--blue); }

  .main { padding:20px 24px; max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 380px; gap:16px; }
  .col-left  { display:flex; flex-direction:column; gap:16px; }
  .col-right { display:flex; flex-direction:column; gap:16px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .card-title { font-size:11px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); }

  /* 시간표 */
  .tt-wrap { overflow-x:auto; }
  .tt-table { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; min-width:400px; }
  .tt-table th { background:var(--bg); color:var(--muted); padding:7px 4px; font-weight:700; text-align:center; border:1px solid var(--border); font-size:11px; }
  .tt-table th.today-col { background:var(--blue-bg); color:var(--blue); }
  .tt-table td { padding:8px 4px; text-align:center; border:1px solid var(--border); font-size:12px; }
  .period-label { color:var(--muted); font-size:11px; font-weight:700; background:var(--bg); }
  .room-cell    { color:var(--blue); font-weight:700; background:var(--blue-bg); }
  .free-cell    { color:var(--hint); font-size:11px; }
  .today-col    { background:#F0F7FF !important; }
  .room-cell.today-col { background:#C8E1F7 !important; }
  .today-badge { display:inline-block; font-size:9px; background:var(--blue); color:#fff; border-radius:3px; padding:1px 5px; margin-left:4px; vertical-align:middle; font-weight:700; }

  /* 필터 */
  .filter-row { display:flex; gap:4px; }
  .filter-btn { font-size:11px; padding:4px 10px; border:1px solid var(--border); border-radius:20px; background:none; color:var(--muted); cursor:pointer; transition:all .15s; font-family:inherit; }
  .filter-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }

  /* 입력 공통 */
  .input-row { display:flex; gap:8px; }
  input[type="text"],input[type="date"],input[type="url"],input[type="password"],select,textarea {
    font-family:inherit; font-size:13px; padding:8px 12px;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--bg); color:var(--text); outline:none; transition:border-color .15s;
  }
  input:focus,select:focus,textarea:focus { border-color:var(--blue); background:#fff; }
  .flex1 { flex:1; }
  .btn { font-family:inherit; font-size:13px; font-weight:700; padding:8px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:all .15s; border:none; white-space:nowrap; }
  .btn-primary { background:var(--blue); color:#fff; }
  .btn-primary:hover { background:#0F4B80; }
  .btn-purple  { background:var(--purple); color:#fff; }
  .btn-purple:hover  { background:#3D3490; }
  .btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--red); color:var(--red); }
  .btn-sm { font-size:11px; padding:5px 12px; }

  /* 투두 입력 */
  .todo-input-area { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }

  /* 투두 아이템 */
  .todo-list { display:flex; flex-direction:column; }
  .todo-item { display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:var(--radius-sm); border-bottom:1px solid var(--border); transition:background .1s; }
  .todo-item:last-child { border-bottom:none; }
  .todo-item:hover { background:var(--bg); }
  .todo-item input[type="checkbox"] { width:16px; height:16px; accent-color:var(--blue); cursor:pointer; flex-shrink:0; }
  .todo-body { flex:1; min-width:0; }
  .todo-text-label { font-size:13px; color:var(--text); }
  .todo-text-label.done { text-decoration:line-through; color:var(--hint); }
  .todo-meta { display:flex; align-items:center; gap:6px; margin-top:3px; flex-wrap:wrap; }
  .due-label { font-size:11px; color:var(--muted); }
  .due-label.overdue  { color:var(--red);   font-weight:700; }
  .due-label.duetoday { color:var(--amber); font-weight:700; }
  .pri-badge { font-size:10px; border-radius:4px; padding:2px 7px; font-weight:700; }
  .pri-high { background:var(--red-bg);   color:var(--red); }
  .pri-mid  { background:var(--amber-bg); color:var(--amber); }
  .pri-low  { background:var(--green-bg); color:var(--green); }
  .todo-actions { display:flex; gap:4px; flex-shrink:0; }
  .icon-btn { font-size:11px; padding:3px 8px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:none; font-family:inherit; color:var(--muted); transition:all .15s; }
  .icon-btn:hover        { border-color:var(--blue); color:var(--blue); }
  .icon-btn.danger:hover { border-color:var(--red);  color:var(--red); }

  /* 인라인 편집 */
  .edit-form { display:flex; flex-direction:column; gap:6px; padding:10px; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border); margin:4px 0; }
  .edit-form .row { display:flex; gap:6px; }
  .edit-form input,.edit-form select { font-size:12px; padding:6px 10px; }

  /* 통계 칩 */
  .stat-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; }
  .chip-blue   { background:var(--blue-bg);   color:var(--blue); }
  .chip-red    { background:var(--red-bg);    color:var(--red); }
  .chip-green  { background:var(--green-bg);  color:var(--green); }
  .chip-purple { background:var(--purple-bg); color:var(--purple); }

  /* ── AI 메시지 분석 패널 ── */
  .ai-panel { border:1px solid var(--purple); border-radius:var(--radius); background:var(--surface); padding:18px 20px; }
  .ai-panel .card-title { color:var(--purple); }
  .ai-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; background:var(--purple-bg); color:var(--purple); border-radius:20px; padding:2px 8px; font-weight:700; }

  .ai-textarea { width:100%; min-height:100px; resize:vertical; font-size:13px; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-family:inherit; line-height:1.6; outline:none; transition:border-color .15s; }
  .ai-textarea:focus { border-color:var(--purple); background:#fff; }
  .ai-textarea::placeholder { color:var(--hint); }

  .ai-analyze-btn { width:100%; margin-top:8px; padding:10px; background:var(--purple); color:#fff; border:none; border-radius:var(--radius-sm); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .ai-analyze-btn:hover { background:#3D3490; }
  .ai-analyze-btn:disabled { background:var(--hint); cursor:not-allowed; }

  /* AI 결과 */
  .ai-results { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  .ai-result-item { background:var(--purple-bg); border:1px solid #C5C1F0; border-radius:var(--radius-sm); padding:12px 14px; display:flex; align-items:flex-start; gap:10px; }
  .ai-result-body { flex:1; min-width:0; }
  .ai-result-text { font-size:13px; color:var(--text); font-weight:600; }
  .ai-result-meta { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
  .ai-result-actions { display:flex; gap:6px; margin-top:8px; }
  .add-todo-btn { font-size:11px; padding:4px 12px; background:var(--purple); color:#fff; border:none; border-radius:4px; cursor:pointer; font-family:inherit; font-weight:700; }
  .add-todo-btn.added { background:var(--green); }
  .add-todo-btn:disabled { background:var(--hint); cursor:not-allowed; }
  .skip-btn { font-size:11px; padding:4px 10px; background:none; border:1px solid var(--border); border-radius:4px; color:var(--muted); cursor:pointer; font-family:inherit; }

  /* 로딩 스피너 */
  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* 바로가기 */
  .shortcut-grid { display:flex; flex-direction:column; gap:8px; }
  .shortcut-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); text-decoration:none; transition:all .15s; background:var(--bg); }
  .shortcut-item:hover { border-color:#A8C8E8; background:var(--blue-bg); }
  .sc-icon  { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .sc-label { font-size:13px; font-weight:700; color:var(--text); }
  .sc-url   { font-size:11px; color:var(--hint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
  .sc-del   { margin-left:auto; font-size:11px; color:var(--hint); cursor:pointer; padding:3px 7px; border:1px solid var(--border); border-radius:4px; background:none; transition:all .15s; flex-shrink:0; }
  .sc-del:hover { border-color:var(--red); color:var(--red); }
  .sc-add-form { display:none; flex-direction:column; gap:8px; margin-top:10px; padding-top:12px; border-top:1px solid var(--border); }
  .color-opts { display:flex; gap:6px; flex-wrap:wrap; }
  .color-opt { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
  .color-opt.selected { border-color:var(--blue); }

  /* 오늘 수업 */
  .class-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
  .class-row:last-of-type { border-bottom:none; }
  .class-period { font-size:11px; color:var(--muted); min-width:40px; }
  .class-room   { font-size:14px; font-weight:700; color:var(--blue); }

  /* 설정 모달 */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:var(--radius); padding:24px; width:480px; max-width:90vw; display:flex; flex-direction:column; gap:14px; }
  .modal h2 { font-size:15px; font-weight:700; }
  .modal label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
  .modal input { width:100%; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; }

  .empty   { text-align:center; color:var(--hint); font-size:13px; padding:20px 0; }
  .loading { text-align:center; color:var(--hint); font-size:13px; padding:16px 0; }

  @media(max-width:760px) { .main{grid-template-columns:1fr;padding:12px;} header{padding:0 12px;} #setup-banner{padding:10px 12px;} }
</style>
</head>
<body>

<!-- GAS URL 설정 배너 (최초 1회) -->
<div id="setup-banner">
  <span>⚙️ GAS 웹앱 URL을 입력하세요:</span>
  <input type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/XXXX/exec">
  <button onclick="saveGasUrl()">저장</button>
</div>

<header>
  <h1>📋 선생님 대시보드</h1>
  <div class="header-right">
    <span class="header-date" id="header-date"></span>
    <button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>
  </div>
</header>

<!-- 설정 모달 -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <div>
      <label>GAS 웹앱 URL</label>
      <input type="url" id="s-gas-url" placeholder="https://script.google.com/macros/s/XXXX/exec">
    </div>
    <div>
      <label>Anthropic API 키 <span style="color:var(--purple);font-weight:700;">(AI 메시지 분석용)</span></label>
      <input type="password" id="s-api-key" placeholder="sk-ant-...">
      <div style="font-size:11px;color:var(--hint);margin-top:4px;">브라우저 localStorage에만 저장됩니다. GitHub에 올라가지 않아요.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeSettings()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="col-left">

    <!-- 시간표 -->
    <div class="card">
      <div class="card-header"><span class="card-title">이번 주 시간표</span></div>
      <div class="tt-wrap">
        <table class="tt-table">
          <thead>
            <tr>
              <th style="width:50px;">교시</th>
              <th id="th-0">월</th><th id="th-1">화</th>
              <th id="th-2">수</th><th id="th-3">목</th><th id="th-4">금</th>
            </tr>
          </thead>
          <tbody id="tt-body"></tbody>
        </table>
      </div>
    </div>

    <!-- 할 일 목록 -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">할 일 목록</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="stat-chips" id="todo-stats"></div>
          <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
            <button class="filter-btn" onclick="setFilter('todo',this)">미완료</button>
            <button class="filter-btn" onclick="setFilter('done',this)">완료</button>
          </div>
        </div>
      </div>
      <div class="todo-input-area">
        <div class="input-row">
          <input type="text" class="flex1" id="todo-text" placeholder="할 일을 입력하세요..." onkeydown="if(event.key==='Enter')addTodo()">
        </div>
        <div class="input-row">
          <input type="date" id="todo-due">
          <select id="todo-pri">
            <option value="high">🔴 높음</option>
            <option value="mid" selected>🟡 보통</option>
            <option value="low">🟢 낮음</option>
          </select>
          <button class="btn btn-primary" onclick="addTodo()">추가</button>
        </div>
      </div>
      <div class="todo-list" id="todo-list"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- AI 메시지 분석 -->
    <div class="ai-panel">
      <div class="card-header">
        <span class="card-title">🤖 메시지 분석 → 할 일 추출</span>
        <span class="ai-badge">✨ AI</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">
        충북소통메신저 등에서 받은 메시지를 붙여넣으면 AI가 할 일을 자동으로 추출해요.
      </div>
      <textarea class="ai-textarea" id="ai-message" placeholder="예시) 선생님, 4월 8일까지 3학년 생활기록부 초안 제출 부탁드립니다. 4월 10일 전교생 체험학습 동의서 취합도 해주세요."></textarea>
      <button class="ai-analyze-btn" id="ai-btn" onclick="analyzeMessage()">
        <span id="ai-btn-text">✨ AI로 할 일 추출하기</span>
      </button>
      <div id="ai-results"></div>
    </div>

  </div>

  <div class="col-right">

    <!-- 바로가기 -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">빠른 바로가기</span>
        <button class="btn btn-ghost btn-sm" onclick="toggleScForm()">+ 추가</button>
      </div>
      <div class="shortcut-grid" id="sc-list"><div class="loading">불러오는 중...</div></div>
      <div class="sc-add-form" id="sc-form" style="display:none;">
        <input type="text" id="sc-label" placeholder="이름 (예: 나이스)">
        <input type="url"  id="sc-url"   placeholder="https://neis.go.kr">
        <div style="font-size:12px;color:var(--muted);">아이콘 색상</div>
        <div class="color-opts" id="color-opts"></div>
        <div style="display:flex;gap:6px;margin-top:4px;">
          <button class="btn btn-primary btn-sm" onclick="addShortcut()">저장</button>
          <button class="btn btn-ghost btn-sm"   onclick="toggleScForm()">취소</button>
        </div>
      </div>
    </div>

    <!-- 오늘 수업 -->
    <div class="card">
      <div class="card-header"><span class="card-title">오늘 수업</span></div>
      <div id="today-classes"></div>
    </div>

  </div>
</div>

<script>
// ── 설정 관리 ─────────────────────────────────
const K_GAS = 'teacher_gas_url';
const K_API = 'teacher_api_key';

let GAS_URL = localStorage.getItem(K_GAS) || '';
let API_KEY = localStorage.getItem(K_API) || '';

function saveGasUrl() {
  const v = document.getElementById('gas-url-input').value.trim();
  if (!v) return;
  GAS_URL = v;
  localStorage.setItem(K_GAS, v);
  document.getElementById('setup-banner').style.display = 'none';
  loadAll();
}

function openSettings() {
  document.getElementById('s-gas-url').value = GAS_URL;
  document.getElementById('s-api-key').value = API_KEY;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}
function saveSettings() {
  GAS_URL = document.getElementById('s-gas-url').value.trim();
  API_KEY = document.getElementById('s-api-key').value.trim();
  localStorage.setItem(K_GAS, GAS_URL);
  localStorage.setItem(K_API, API_KEY);
  closeSettings();
  loadAll();
}

if (GAS_URL) document.getElementById('setup-banner').style.display = 'none';

// ── API 헬퍼 ─────────────────────────────────
async function apiGet(action) {
  if (!GAS_URL) return null;
  const res = await fetch(GAS_URL + '?action=' + action);
  return res.json();
}
async function apiPost(body) {
  if (!GAS_URL) return null;
  const res = await fetch(GAS_URL, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── 시간표 ────────────────────────────────────
const TT = [
  ['1교시','107','',   '',   '',   ''   ],
  ['2교시','',  '',   '106','',   '102'],
  ['3교시','',  '105','103','106','105'],
  ['4교시','',  '',   '',   '102',''   ],
  ['5교시','104','107','101','',   '103'],
  ['6교시','',  '101','',   '',   '103'],
  ['7교시','',  '103','104','',   ''   ],
];

const now     = new Date();
const WD      = ['일','월','화','수','목','금','토'];
const dow     = now.getDay();
const todayCI = (dow >= 1 && dow <= 5) ? dow - 1 : -1;
const todayStr= now.toISOString().split('T')[0];

document.getElementById('header-date').textContent =
  now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+WD[dow]+')';
document.getElementById('todo-due').value = todayStr;

['월','화','수','목','금'].forEach((d,i) => {
  const th = document.getElementById('th-'+i);
  if (i === todayCI) { th.innerHTML = d+'<span class="today-badge">오늘</span>'; th.classList.add('today-col'); }
  else th.textContent = d;
});

const ttBody = document.getElementById('tt-body');
TT.forEach(row => {
  const tr = document.createElement('tr');
  row.forEach((cell, ci) => {
    const td = document.createElement('td');
    const isT = ci > 0 && (ci-1) === todayCI;
    if (ci===0) { td.textContent=cell; td.className='period-label'; }
    else if (!cell) { td.textContent='공강'; td.className='free-cell'+(isT?' today-col':''); }
    else { td.textContent=cell; td.className='room-cell'+(isT?' today-col':''); }
    tr.appendChild(td);
  });
  ttBody.appendChild(tr);
});

const todayEl = document.getElementById('today-classes');
if (todayCI >= 0) {
  const cls = TT.map(r=>({p:r[0],rm:r[todayCI+1]})).filter(c=>c.rm);
  todayEl.innerHTML = cls.length
    ? cls.map(c=>`<div class="class-row"><span class="class-period">${c.p}</span><span class="class-room">${c.rm}호</span></div>`).join('')
      +`<div style="font-size:11px;color:var(--muted);margin-top:10px;">총 ${cls.length}교시 수업</div>`
    : '<div class="empty">오늘은 수업이 없어요</div>';
} else {
  todayEl.innerHTML = '<div class="empty">오늘은 주말이에요 🎉</div>';
}

// ── 투두 ──────────────────────────────────────
let todos    = [];
let filter   = 'all';
let editingId= null;

async function loadTodos() {
  if (!GAS_URL) { document.getElementById('todo-list').innerHTML='<div class="empty">GAS URL을 설정해주세요</div>'; return; }
  document.getElementById('todo-list').innerHTML='<div class="loading">불러오는 중...</div>';
  todos = await apiGet('getTodos') || [];
  renderTodos();
}

async function addTodo(text, due, priority) {
  const t   = text     || document.getElementById('todo-text').value.trim();
  const d   = due      || document.getElementById('todo-due').value;
  const p   = priority || document.getElementById('todo-pri').value;
  if (!t) return;
  if (!text) document.getElementById('todo-text').value = '';
  await apiPost({ action:'addTodo', text:t, due:d, priority:p });
  loadTodos();
}

async function toggleTodo(id, done) {
  await apiPost({ action:'updateTodoDone', id, done });
  loadTodos();
}
async function deleteTodo(id) {
  if (!confirm('삭제할까요?')) return;
  await apiPost({ action:'deleteTodo', id });
  loadTodos();
}
function startEdit(id) { editingId=id; renderTodos(); }
function cancelEdit()  { editingId=null; renderTodos(); }
async function saveEdit(id) {
  const t=todos.find(x=>x.id===id); if(!t) return;
  await apiPost({ action:'updateTodo', id,
    text:    document.getElementById('et-'+id).value.trim()||t.text,
    due:     document.getElementById('ed-'+id).value,
    priority:document.getElementById('ep-'+id).value
  });
  editingId=null; loadTodos();
}
function setFilter(f,btn) {
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderTodos();
}

const priLabel={high:'높음',mid:'보통',low:'낮음'};
const priCls  ={high:'pri-high',mid:'pri-mid',low:'pri-low'};

function renderTodos() {
  const list=document.getElementById('todo-list');
  const stats=document.getElementById('todo-stats');
  const total  =todos.length;
  const done   =todos.filter(t=>t.done).length;
  const overdue=todos.filter(t=>!t.done&&t.due&&t.due<todayStr).length;
  stats.innerHTML=
    `<span class="chip chip-blue">${total-done}개 남음</span>`+
    (overdue?`<span class="chip chip-red">기한 초과 ${overdue}</span>`:'')+
    (done   ?`<span class="chip chip-green">완료 ${done}</span>`:'');

  let filtered=todos.filter(t=>filter==='all'?true:filter==='done'?t.done:!t.done)
    .sort((a,b)=>{ if(a.done!==b.done)return a.done?1:-1; return ({high:0,mid:1,low:2}[a.priority]||1)-({high:0,mid:1,low:2}[b.priority]||1); });

  if(!filtered.length){list.innerHTML='<div class="empty">할 일이 없어요 ✨</div>';return;}
  list.innerHTML=filtered.map(t=>{
    const isOverdue=!t.done&&t.due&&t.due<todayStr;
    const isToday2=t.due===todayStr;
    let dueText='';
    if(t.due){const d=new Date(t.due+'T00:00:00');dueText=(d.getMonth()+1)+'/'+d.getDate();if(isToday2)dueText='오늘 마감';if(isOverdue)dueText='기한 초과 ('+dueText+')';}
    if(editingId===t.id)return`<div class="edit-form">
      <input type="text" id="et-${t.id}" value="${esc(t.text)}" class="flex1">
      <div class="row">
        <input type="date" id="ed-${t.id}" value="${t.due||''}">
        <select id="ep-${t.id}">
          <option value="high" ${t.priority==='high'?'selected':''}>🔴 높음</option>
          <option value="mid"  ${t.priority==='mid' ?'selected':''}>🟡 보통</option>
          <option value="low"  ${t.priority==='low' ?'selected':''}>🟢 낮음</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="saveEdit(${t.id})">저장</button>
        <button class="btn btn-ghost btn-sm"   onclick="cancelEdit()">취소</button>
      </div></div>`;
    return`<div class="todo-item">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id},this.checked)">
      <div class="todo-body">
        <div class="todo-text-label${t.done?' done':''}">${esc(t.text)}</div>
        <div class="todo-meta">
          <span class="pri-badge ${priCls[t.priority]||'pri-mid'}">${priLabel[t.priority]||'보통'}</span>
          ${dueText?`<span class="due-label${isOverdue?' overdue':isToday2?' duetoday':''}">${dueText}</span>`:''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="icon-btn" onclick="startEdit(${t.id})">수정</button>
        <button class="icon-btn danger" onclick="deleteTodo(${t.id})">삭제</button>
      </div>
    </div>`;
  }).join('');
}

// ── AI 메시지 분석 ────────────────────────────
async function analyzeMessage() {
  if (!API_KEY) {
    alert('API 키가 없어요!\n우상단 ⚙️ 설정에서 Anthropic API 키를 입력해주세요.');
    return;
  }
  const msg = document.getElementById('ai-message').value.trim();
  if (!msg) { alert('메시지를 입력해주세요.'); return; }

  const btn     = document.getElementById('ai-btn');
  const btnText = document.getElementById('ai-btn-text');
  btn.disabled  = true;
  btnText.innerHTML = '<div class="spinner"></div> 분석 중...';
  document.getElementById('ai-results').innerHTML = '';

  const today = now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model:      'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 교사를 돕는 할 일 추출 AI입니다. 오늘 날짜는 ${today}입니다.
메시지에서 해야 할 일(task)을 추출해서 반드시 아래 JSON 형식으로만 응답하세요. 다른 말은 하지 마세요.

{
  "tasks": [
    {
      "text": "할 일 내용 (간결하게 20자 이내)",
      "due": "YYYY-MM-DD 또는 빈 문자열",
      "priority": "high 또는 mid 또는 low",
      "reason": "우선순위 이유 한 줄"
    }
  ]
}

우선순위 기준: 마감이 3일 이내이거나 긴급하면 high, 일주일 이내면 mid, 그 외 low.
날짜가 명시되지 않으면 due는 빈 문자열로.`,
        messages: [{ role:'user', content: msg }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw  = data.content.map(c=>c.text||'').join('');
    const clean= raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    renderAiResults(parsed.tasks || []);

  } catch(e) {
    document.getElementById('ai-results').innerHTML =
      `<div style="color:var(--red);font-size:13px;padding:10px 0;">오류가 발생했어요: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btnText.textContent = '✨ AI로 할 일 추출하기';
  }
}

function renderAiResults(tasks) {
  const el = document.getElementById('ai-results');
  if (!tasks.length) {
    el.innerHTML = '<div class="empty" style="margin-top:10px;">추출된 할 일이 없어요</div>';
    return;
  }
  el.innerHTML = `<div style="font-size:12px;color:var(--purple);font-weight:700;margin-bottom:8px;margin-top:4px;">📋 ${tasks.length}개 항목 추출됨 — 추가할 항목을 선택하세요</div>` +
    tasks.map((t,i) => {
      const dueDisp = t.due ? (() => { const d=new Date(t.due+'T00:00:00'); return (d.getMonth()+1)+'/'+(d.getDate()); })() : '마감 없음';
      return `<div class="ai-result-item" id="ai-item-${i}">
        <div class="ai-result-body">
          <div class="ai-result-text">${esc(t.text)}</div>
          <div class="ai-result-meta">
            <span class="pri-badge ${priCls[t.priority]||'pri-mid'}">${priLabel[t.priority]||'보통'}</span>
            <span class="due-label">📅 ${dueDisp}</span>
            <span style="font-size:11px;color:var(--muted);">${esc(t.reason||'')}</span>
          </div>
          <div class="ai-result-actions">
            <button class="add-todo-btn" id="ai-add-${i}" onclick="addFromAI(${i},'${esc(t.text)}','${t.due||''}','${t.priority||'mid'}')">+ 할 일에 추가</button>
            <button class="skip-btn" onclick="skipAI(${i})">건너뜀</button>
          </div>
        </div>
      </div>`;
    }).join('');
}

async function addFromAI(i, text, due, priority) {
  const btn = document.getElementById('ai-add-'+i);
  btn.disabled = true;
  btn.textContent = '추가 중...';
  await addTodo(text, due, priority);
  btn.textContent = '✓ 추가됨';
  btn.classList.add('added');
  document.getElementById('ai-item-'+i).style.opacity = '0.5';
}

function skipAI(i) {
  const item = document.getElementById('ai-item-'+i);
  item.style.opacity = '0.3';
  item.querySelectorAll('button').forEach(b=>b.disabled=true);
}

// ── 바로가기 ──────────────────────────────────
let shortcuts    = [];
let selectedColor= '#E6F1FB';
const COLORS = ['#E6F1FB','#EAF3DE','#FAEEDA','#EEEDFE','#FCEBEB','#F5F4F0'];

const colorOptsEl = document.getElementById('color-opts');
COLORS.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='color-opt'+(i===0?' selected':'');
  d.style.background=c;
  d.onclick=()=>{ selectedColor=c; document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); };
  colorOptsEl.appendChild(d);
});

async function loadShortcuts() {
  if (!GAS_URL) { document.getElementById('sc-list').innerHTML='<div class="empty">GAS URL을 설정해주세요</div>'; return; }
  shortcuts = await apiGet('getShortcuts') || [];
  renderShortcuts();
}

function toggleScForm() {
  const f=document.getElementById('sc-form');
  f.style.display=f.style.display==='flex'?'none':'flex';
  f.style.flexDirection='column';
}
function getIcon(url){
  if(url.includes('drive.google'))return'📁';
  if(url.includes('classroom.google'))return'🖥️';
  if(url.includes('docs.google'))return'📄';
  if(url.includes('sheets.google'))return'📊';
  if(url.includes('neis'))return'👤';
  if(url.includes('youtube'))return'▶️';
  if(url.includes('github'))return'🐱';
  if(url.includes('notion'))return'📝';
  return'🔗';
}
async function addShortcut() {
  const label=document.getElementById('sc-label').value.trim();
  const url  =document.getElementById('sc-url').value.trim();
  if(!label||!url){alert('이름과 URL을 입력해주세요.');return;}
  const fullUrl=url.startsWith('http')?url:'https://'+url;
  await apiPost({action:'addShortcut',label,url:fullUrl,color:selectedColor,icon:getIcon(fullUrl)});
  document.getElementById('sc-label').value='';
  document.getElementById('sc-url').value='';
  toggleScForm(); loadShortcuts();
}
async function deleteShortcut(id){
  if(!confirm('바로가기를 삭제할까요?'))return;
  await apiPost({action:'deleteShortcut',id});
  loadShortcuts();
}
function renderShortcuts(){
  const list=document.getElementById('sc-list');
  if(!shortcuts.length){list.innerHTML='<div class="empty">바로가기를 추가해 보세요</div>';return;}
  list.innerHTML=shortcuts.map(sc=>`
    <a class="shortcut-item" href="${esc(sc.url)}" target="_blank" rel="noopener">
      <div class="sc-icon" style="background:${sc.color}">${sc.icon||'🔗'}</div>
      <div style="min-width:0;">
        <div class="sc-label">${esc(sc.label)}</div>
        <div class="sc-url">${esc(sc.url)}</div>
      </div>
      <button class="sc-del" onclick="event.preventDefault();deleteShortcut(${sc.id})">삭제</button>
    </a>`).join('');
}

// ── 초기 로드 ─────────────────────────────────
function loadAll(){ loadTodos(); loadShortcuts(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

if (GAS_URL) loadAll();
</script>
